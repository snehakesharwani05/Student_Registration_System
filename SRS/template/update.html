<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Student</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
    body{
        background:#f4f4f4;
        transition:0.3s;
    }

    .card{
        max-width:650px;
        margin:40px auto;
        padding:25px;
        border-radius:12px;
        box-shadow:0 5px 15px rgba(0,0,0,.1);
        background:#fff;
    }

    h2{
        color:#ff7a00;
        font-weight:bold;
    }

    .btn-update{
        background:#ff7a00;
        color:#fff;
    }

    .btn-update:hover{
        background:#e56b00;
        color:#fff;
    }

    .toggle-btn{
        float:right;
        margin-bottom:15px;
    }

    /* Dark Mode */
    .dark-mode{
        background:#2d2d2d;
        color:white;
    }

    .dark-mode .card{
        background:#444;
        color:white;
    }

    .dark-mode .form-control,
    .dark-mode .form-select{
        background:#555;
        color:white;
        border:1px solid #777;
    }

    .dark-mode .form-control::placeholder{
        color:#ddd;
    }
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <button class="btn btn-dark toggle-btn" onclick="toggleMode()">
            <i class="fas fa-moon"></i> Mode
        </button>

        <h2 class="text-center mb-4">Update Student</h2>

        <form method="POST" action="{% url 'update' student.0 %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control" name="name" value="{{ student.1}}">
            </div>

            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" name="roll" value="{{ student.2}}">
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" name="department" value="{{ student.3}}">
            </div>

            <div class="mb-3">
                <label class="form-label">Semester</label>
                <select class="form-select" name="semester">
                    <option>{{ student.4 }}</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" value="{{ student.5 }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" value="{{ student.6 }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="3" name="address">{{ student.7 }}</textarea>
            </div>

            <button type="submit" class="btn btn-update">
                <i class="fas fa-edit"></i> Update
            </button>

            <a href="{% url 'student_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

<script>
function toggleMode(){
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
